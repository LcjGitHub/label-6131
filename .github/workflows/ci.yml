name: CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  backend-health-check:
    name: 后端健康检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装后端依赖
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 启动后端服务
        working-directory: ./backend
        run: |
          python app.py &
          echo $! > server.pid
          sleep 5

      - name: 验证健康检查接口
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health)
          if [ "$response" -ne 200 ]; then
            echo "健康检查失败，HTTP 状态码: $response"
            exit 1
          fi
          body=$(curl -s http://localhost:3000/api/health)
          echo "健康检查响应: $body"
          if ! echo "$body" | grep -q '"status":"ok"'; then
            echo "健康检查响应体不正确"
            exit 1
          fi
          echo "健康检查接口验证通过"

      - name: 停止后端服务
        if: always()
        run: |
          if [ -f backend/server.pid ]; then
            kill $(cat backend/server.pid) 2>/dev/null || true
          fi

  frontend-type-check-and-build:
    name: 前端类型检查与生产构建
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装前端依赖
        working-directory: ./frontend
        run: npm ci

      - name: 执行 TypeScript 类型检查
        working-directory: ./frontend
        run: npx tsc -b --noEmit

      - name: 执行生产构建
        working-directory: ./frontend
        run: npm run build
